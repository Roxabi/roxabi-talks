# .claude/stack.yml — dev-core stack configuration
schema_version: "1.0"

runtime: bun
package_manager: bun

backend:
  framework: none
  path: ""

frontend:
  framework: tanstack-start
  path: apps/web
  ui_package: "@repo/ui"
  ui_src: packages/ui/src

shared:
  ui: packages/ui
  config: packages/config

build:
  orchestrator: none
  formatter: biome
  formatter_config: biome.json
  formatter_fix_cmd: "bunx biome check --write"

testing:
  unit: none
  e2e: none

hooks:
  tool: lefthook

deploy:
  platform: vercel
  secrets_cmd: "vercel env add"

docs:
  framework: none
  path: docs
  format: md

commands:
  dev: bun run dev
  build: bun run build
  test: ""
  lint: bun run lint
  typecheck: bun run typecheck
  format: "bunx biome check --write ."
  install: bun install

artifacts:
  analyses: artifacts/analyses
  specs: artifacts/specs
  frames: artifacts/frames
  plans: artifacts/plans

standards:
  frontend: docs/standards/frontend-patterns.md
  testing: docs/standards/testing.md
  code_review: docs/standards/code-review.md
  architecture: docs/architecture/
  configuration: docs/configuration.md
  contributing: docs/contributing.md
